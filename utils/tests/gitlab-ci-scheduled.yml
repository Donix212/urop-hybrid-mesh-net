# NS3 CI script for testing

# Defines the steps to run the tests
# Inherit with "extends: .base-test" and remember to set
# the following variables: COMPILER (g++, clang++, ...) and
# MODE (debug, default, optimized)

.base-test:
  extends: .base-build-ubuntu
  variables:
    COMPILER: g++
    EXTRA_OPTIONS: --disable-gtk

daily-jobs:
  rules:
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      allow_failure: true
  stage: pre-build
  script:
    - echo "Starting daily jobs"

weekly-slow-jobs:
  rules:
    - if: $RELEASE == "weekly"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      allow_failure: true
  stage: pre-build
  script:
    - echo "Starting weekly jobs"

# Run the test.py script with files compiled in debug mode
daily-build-test-debug:
  extends: .base-test
  rules:
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  needs: ["daily-jobs"]
  dependencies: []
  stage: build
  variables:
    MODE: debug
  tags:
    - nsnam
    - linux

# Run the test.py script with files compiled in default mode
daily-build-default:
  extends: .base-test
  rules:
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: build
  needs: ["daily-jobs"]
  variables:
    MODE: default

daily-test-default:
  extends: .base-test
  rules:
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: test
  needs: ["daily-build-default"]
  dependencies:
    - daily-build-default
  variables:
    MODE: default

# Run the test.py script with files compiled in optimized mode
daily-build-optimized:
  extends: .base-test
  rules:
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: build
  needs: ["daily-jobs"]
  variables:
    MODE: optimized

daily-test-optimized:
  extends: .base-test
  rules:
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: test
  needs: ["daily-build-optimized"]
  dependencies:
    - daily-build-optimized
  variables:
    MODE: optimized

### Valgrind tests
# Run the test.py script with files compiled in optimized mode + valgrind (daily)
daily-build-test-optimized-valgrind:
  extends: .base-test
  rules:
    - if: $RELEASE == "daily"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: build
  needs: ["daily-jobs"]
  dependencies: []
  variables:
    MODE: optimized
    VALGRIND_FLAG: -g --verbose-failed
    FORCE_TESTS: Force
  tags:
    - nsnam
    - linux

# Run the test.py script with files compiled in debug mode
weekly-build-test-debug-valgrind:
  extends: .base-test
  rules:
    - if: $RELEASE == "weekly"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: build
  needs: ["weekly-slow-jobs"]
  dependencies: []
  variables:
    MODE: debug
    VALGRIND_FLAG: -g --verbose-failed
    FORCE_TESTS: Force
  tags:
    - nsnam
    - linux

# Run the test.py script with files compiled in default mode
weekly-build-test-default-valgrind:
  extends: .base-test
  rules:
    - if: $RELEASE == "weekly"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: build
  needs: ["weekly-slow-jobs"]
  dependencies: []
  variables:
    MODE: default
    VALGRIND_FLAG: -g --verbose-failed
    FORCE_TESTS: Force
  tags:
    - nsnam
    - linux

# Run the test.py script with files compiled in optimized mode
weekly-build-test-optimized-valgrind:
  extends: .base-test
  rules:
    - if: $RELEASE == "weekly"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: build
  needs: ["weekly-slow-jobs"]
  dependencies: []
  variables:
    MODE: optimized
    VALGRIND_FLAG: -g --verbose-failed
    FORCE_TESTS: Force
  tags:
    - nsnam
    - linux

# Do a check for the TAKES_FOREVER jobs, only in optimized mode
weekly-build-test-takes-forever-optimized:
  extends: .base-test
  rules:
    - if: $RELEASE == "weekly"
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      allow_failure: true
  stage: build
  needs: ["weekly-slow-jobs"]
  dependencies: []
  variables:
    MODE: optimized
    FULLNESS: "-f TAKES_FOREVER"
    FORCE_TESTS: Force
  tags:
    - nsnam
    - linux
